<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FasTrak Defender — Toll Violation Defense Platform</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="aurora">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>
  <div class="grain"></div>

  <div class="app">
    <header class="header">
      <div class="brand">
        <span class="brand-mark">&#9878;</span>
        <span class="brand-text">FasTrak Defender</span>
        <span class="brand-sub">Toll Violation Defense</span>
      </div>
      <select class="case-selector" id="caseSelector">
        <option value="">All Cases</option>
      </select>
      <nav class="nav">
        <button class="nav-btn active" data-view="dashboard">Dashboard</button>
        <button class="nav-btn" data-view="case-detail">Case</button>
        <button class="nav-btn" data-view="contest-guide">Contest Guide</button>
        <button class="nav-btn" data-view="violations">Violations</button>
        <button class="nav-btn" data-view="defenses">Defenses</button>
        <button class="nav-btn" data-view="letters">Letters</button>
        <button class="nav-btn" data-view="timeline">Timeline</button>
        <button class="nav-btn" data-view="legal-ref">Legal Ref</button>
      </nav>
    </header>

    <div class="main">
      <aside class="sidebar">
        <div class="sidebar-header">Files</div>
        <div class="file-tree" id="fileTree"></div>
      </aside>

      <div class="content" id="content">
        <!-- Dashboard View -->
        <div class="view active" id="view-dashboard"></div>
        <!-- Case Detail View -->
        <div class="view" id="view-case-detail"></div>
        <!-- Contest Guide View -->
        <div class="view" id="view-contest-guide"></div>
        <!-- Violations View -->
        <div class="view" id="view-violations"></div>
        <!-- Defenses View -->
        <div class="view" id="view-defenses"></div>
        <!-- Letters View -->
        <div class="view" id="view-letters"></div>
        <!-- Timeline View -->
        <div class="view" id="view-timeline"></div>
        <!-- Legal Reference View -->
        <div class="view" id="view-legal-ref"></div>
        <!-- PDF Viewer -->
        <div class="view" id="view-pdf">
          <iframe class="pdf-viewer" id="pdfFrame"></iframe>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
